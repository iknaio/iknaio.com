baseURL = "https://iknaio.com/"
languageCode = "en"
title = "Iknaio Cryptoasset Analytics"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[params]
  description = "Cryptoasset intelligence platform. Investigate crypto money flows — faster, deeper, broader."
  tagline = "We connect the dots. We follow the money. We reveal the network."
  email = "contact@iknaio.com"
  github = "https://github.com/graphsense"
  linkedin = "https://www.linkedin.com/company/iknaio-cryptoasset-analytics-gmbh"
  youtube = "https://www.youtube.com/@IknaioCryptoassetAnalytics"
  odoo_form = "https://iknaio.odoo.com/free"

  [params.lightbox]
    navEnabled = false

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[frontmatter]
  lastmod = ["lastmod", "date", ":git", ":fileModTime"]

