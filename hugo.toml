[[menus.main]]
  name = "Solutions"
  url = "/solutions/"
  weight = 2

[[menus.main]]
  name = "Packages"
  url = "/packages/"
  weight = 3

[[menus.main]]
  name = "Insights"
  url = "/insights/"
  weight = 4

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 10
  [menus.main.params]
    group = "company"

[[menus.main]]
  name = "Contact"
  url = "/contact/"
  weight = 12
  [menus.main.params]
    group = "company"
