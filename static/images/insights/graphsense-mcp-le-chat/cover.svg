<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efedea"/>
      <stop offset="100%" stop-color="#e5e2dc"/>
    </linearGradient>
    <radialGradient id="glow" cx="92%" cy="96%" r="65%">
      <stop offset="0%" stop-color="#fa5111" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fa5111" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardshadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- card shadow -->
  <rect x="70" y="60" width="1060" height="542" rx="20" fill="#1a1206" fill-opacity="0.16" filter="url(#cardshadow)"/>
  <!-- card -->
  <rect x="70" y="44" width="1060" height="542" rx="20" fill="#ffffff"/>

  <!-- header -->
  <rect x="104" y="62" width="32" height="32" rx="9" fill="#fa5111"/>
  <text x="150" y="86" font-family="DejaVu Sans" font-weight="bold" font-size="18" fill="#1c1b19">GraphSense agent</text>
  <text x="150" y="105" font-family="DejaVu Sans" font-size="12.5" fill="#a09e98">Connected via MCP</text>
  <line x1="70" y1="124" x2="1130" y2="124" stroke="#edebe7" stroke-width="1"/>

  <!-- user message bubble -->
  <rect x="712" y="150" width="384" height="84" rx="16" fill="#f1f0ec"/>
  <text x="736" y="184" font-family="DejaVu Sans" font-size="16.5" fill="#2c2b29">What can you tell me about</text>
  <text x="736" y="212" font-family="DejaVu Sans Mono" font-size="13" fill="#73716c">1Archive1n2C579dMsAu3iC6tWzuQJz8dN?</text>

  <!-- assistant header -->
  <rect x="104" y="258" width="30" height="30" rx="9" fill="#fa5111"/>
  <text x="146" y="278" font-family="DejaVu Sans" font-size="14" fill="#6e6d69">GraphSense agent</text>

  <!-- tool-call chips -->
  <g font-family="DejaVu Sans Mono" font-size="13">
    <rect x="104" y="300" width="124" height="30" rx="9" fill="#f6f5f2" stroke="#e6e4df"/>
    <circle cx="124" cy="315" r="3" fill="#fa5111"/>
    <text x="137" y="320" fill="#b8400c">search</text>
    <path d="M201,315 l3,4 l8,-9" fill="none" stroke="#fa5111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="238" y="300" width="188" height="30" rx="9" fill="#f6f5f2" stroke="#e6e4df"/>
    <circle cx="258" cy="315" r="3" fill="#fa5111"/>
    <text x="271" y="320" fill="#b8400c">lookup_address</text>
    <path d="M399,315 l3,4 l8,-9" fill="none" stroke="#fa5111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="436" y="300" width="188" height="30" rx="9" fill="#f6f5f2" stroke="#e6e4df"/>
    <circle cx="456" cy="315" r="3" fill="#fa5111"/>
    <text x="469" y="320" fill="#b8400c">list_neighbors</text>
    <path d="M597,315 l3,4 l8,-9" fill="none" stroke="#fa5111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- assistant answer -->
  <text x="104" y="368" font-family="DejaVu Sans" font-size="18" fill="#2c2b29">This is the <tspan font-weight="bold" fill="#000000">Internet Archive's</tspan> public Bitcoin</text>
  <text x="104" y="397" font-family="DejaVu Sans" font-size="18" fill="#2c2b29">donation address, active since 2013.</text>
  <text x="104" y="427" font-family="DejaVu Sans" font-size="15.5" fill="#97958f">Lifetime: ~633 BTC received across 6,500+ transactions.</text>

  <!-- composer -->
  <rect x="104" y="446" width="992" height="132" rx="16" fill="#ffffff" stroke="#e3e1dc" stroke-width="1"/>
  <path d="M120,446 h960 a16,16 0 0 1 16,16 v22 h-992 v-22 a16,16 0 0 1 16,-16 Z" fill="#fa5111"/>
  <text x="128" y="471" font-family="DejaVu Sans" font-weight="bold" font-size="13.5" fill="#ffffff">@GraphSense agent</text>
  <path d="M255,466 l4,4 l4,-4" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <g stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.9">
    <line x1="1067" y1="462" x2="1075" y2="470"/>
    <line x1="1075" y1="462" x2="1067" y2="470"/>
  </g>

  <text x="128" y="517" font-family="DejaVu Sans" font-size="15" fill="#a8a6a0">Ask about an address, transaction, or cluster…</text>

  <!-- composer bottom controls -->
  <rect x="128" y="540" width="30" height="30" rx="8" fill="#ffffff" stroke="#e3e1dc"/>
  <g stroke="#8a8884" stroke-width="1.8" stroke-linecap="round">
    <line x1="143" y1="549" x2="143" y2="561"/>
    <line x1="137" y1="555" x2="149" y2="555"/>
  </g>
  <text x="1000" y="560" font-family="DejaVu Sans" font-size="13.5" fill="#6e6d69">Fast</text>
  <path d="M1032,552 l4,4 l4,-4" fill="none" stroke="#6e6d69" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1066" cy="555" r="17" fill="#fa5111"/>
  <path d="M1066,547 l0,16 M1066,547 l-6,7 M1066,547 l6,7" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
