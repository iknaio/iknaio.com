<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-label="Magnifying glass over a transaction network with one node highlighted">
  <defs>
    <clipPath id="learnings-lens">
      <circle cx="28" cy="30" r="22"/>
    </clipPath>
  </defs>

  <!-- Outside-the-lens: faint network -->
  <g stroke="rgb(42,42,42)" stroke-width="1.8" stroke-linecap="round" opacity="0.35">
    <line x1="56" y1="8"  x2="68" y2="20"/>
    <line x1="68" y1="20" x2="74" y2="38"/>
    <line x1="74" y1="38" x2="66" y2="56"/>
    <line x1="66" y1="56" x2="56" y2="68"/>
    <line x1="68" y1="20" x2="46" y2="10"/>
    <line x1="66" y1="56" x2="40" y2="62"/>
    <line x1="56" y1="8"  x2="38" y2="14"/>
  </g>
  <g opacity="0.35">
    <circle cx="56" cy="8"  r="3.2" fill="rgb(42,42,42)"/>
    <circle cx="68" cy="20" r="3.2" fill="rgb(42,42,42)"/>
    <circle cx="74" cy="38" r="3.2" fill="rgb(42,42,42)"/>
    <circle cx="66" cy="56" r="3.2" fill="rgb(42,42,42)"/>
    <circle cx="56" cy="68" r="3.2" fill="rgb(42,42,42)"/>
    <circle cx="46" cy="10" r="3.2" fill="rgb(42,42,42)"/>
    <circle cx="40" cy="62" r="3.2" fill="rgb(42,42,42)"/>
    <circle cx="38" cy="14" r="3.2" fill="rgb(42,42,42)"/>
  </g>

  <!-- Lens fill (glassy light green) -->
  <circle cx="28" cy="30" r="22" fill="#E8F8EF"/>

  <!-- Inside the lens: zoomed-in graph with green focus node -->
  <g clip-path="url(#learnings-lens)">
    <g stroke="rgb(42,42,42)" stroke-width="2.5" stroke-linecap="round">
      <line x1="8"  y1="16" x2="28" y2="30"/>
      <line x1="28" y1="30" x2="50" y2="16"/>
      <line x1="28" y1="30" x2="48" y2="50"/>
      <line x1="28" y1="30" x2="6"  y2="42"/>
    </g>
    <circle cx="28" cy="30" r="10" fill="rgb(43,221,150)" opacity="0.28"/>
    <circle cx="28" cy="30" r="6"  fill="rgb(43,221,150)"/>
  </g>

  <!-- Lens rim: dark outer, thin green inner -->
  <circle cx="28" cy="30" r="22" fill="none" stroke="rgb(42,42,42)" stroke-width="4"/>
  <circle cx="28" cy="30" r="20" fill="none" stroke="rgb(43,221,150)" stroke-width="1.5" opacity="0.7"/>

  <!-- Glass highlight -->
  <path d="M 14 24 Q 10 32 14 40" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Handle -->
  <line x1="44" y1="46" x2="68" y2="70" stroke="rgb(42,42,42)" stroke-width="6.5" stroke-linecap="round"/>
</svg>
