<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 533" width="800" height="533" role="img" aria-label="A magnifying glass zooms in on a green node in a transaction graph: outside the lens the graph fades into noise, inside it the highlighted node and its connections jump out.">
  <rect width="800" height="533" fill="#F5F5F5"/>

  <defs>
    <clipPath id="lens-clip">
      <circle cx="240" cy="240" r="135"/>
    </clipPath>

    <radialGradient id="lens-fill" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F8EF"/>
    </radialGradient>

    <g id="graph">
      <g stroke="rgb(42,42,42)" stroke-width="1.5" fill="none">
        <line x1="80"  y1="90"  x2="180" y2="60"/>
        <line x1="180" y1="60"  x2="290" y2="110"/>
        <line x1="290" y1="110" x2="380" y2="60"/>
        <line x1="380" y1="60"  x2="490" y2="100"/>
        <line x1="490" y1="100" x2="610" y2="70"/>
        <line x1="610" y1="70"  x2="720" y2="120"/>
        <line x1="80"  y1="90"  x2="160" y2="200"/>
        <line x1="160" y1="200" x2="290" y2="110"/>
        <line x1="290" y1="110" x2="240" y2="240"/>
        <line x1="240" y1="240" x2="370" y2="220"/>
        <line x1="370" y1="220" x2="380" y2="60"/>
        <line x1="370" y1="220" x2="490" y2="100"/>
        <line x1="370" y1="220" x2="470" y2="320"/>
        <line x1="160" y1="200" x2="240" y2="240"/>
        <line x1="240" y1="240" x2="170" y2="370"/>
        <line x1="170" y1="370" x2="280" y2="400"/>
        <line x1="280" y1="400" x2="370" y2="220"/>
        <line x1="280" y1="400" x2="430" y2="430"/>
        <line x1="430" y1="430" x2="470" y2="320"/>
        <line x1="470" y1="320" x2="600" y2="360"/>
        <line x1="600" y1="360" x2="710" y2="290"/>
        <line x1="710" y1="290" x2="720" y2="120"/>
        <line x1="710" y1="290" x2="720" y2="430"/>
        <line x1="720" y1="430" x2="600" y2="360"/>
        <line x1="490" y1="100" x2="710" y2="290"/>
      </g>
      <g>
        <circle cx="80"  cy="90"  r="9"  fill="rgb(42,42,42)"/>
        <circle cx="180" cy="60"  r="9"  fill="rgb(42,42,42)"/>
        <circle cx="290" cy="110" r="11" fill="rgb(43,221,150)"/>
        <circle cx="380" cy="60"  r="9"  fill="rgb(42,42,42)"/>
        <circle cx="490" cy="100" r="11" fill="rgb(43,221,150)"/>
        <circle cx="610" cy="70"  r="9"  fill="rgb(42,42,42)"/>
        <circle cx="720" cy="120" r="9"  fill="rgb(42,42,42)"/>
        <circle cx="160" cy="200" r="9"  fill="rgb(42,42,42)"/>
        <circle cx="240" cy="240" r="11" fill="rgb(43,221,150)"/>
        <circle cx="370" cy="220" r="13" fill="rgb(42,42,42)"/>
        <circle cx="170" cy="370" r="9"  fill="rgb(42,42,42)"/>
        <circle cx="280" cy="400" r="11" fill="rgb(43,221,150)"/>
        <circle cx="430" cy="430" r="9"  fill="rgb(42,42,42)"/>
        <circle cx="470" cy="320" r="11" fill="rgb(43,221,150)"/>
        <circle cx="600" cy="360" r="9"  fill="rgb(42,42,42)"/>
        <circle cx="710" cy="290" r="13" fill="rgb(42,42,42)"/>
        <circle cx="720" cy="430" r="9"  fill="rgb(42,42,42)"/>
      </g>
    </g>
  </defs>

  <!-- Outside-the-lens: untrained eye sees only noise -->
  <use href="#graph" opacity="0.12"/>

  <!-- Lens fill (glassy radial gradient) -->
  <circle cx="240" cy="240" r="135" fill="url(#lens-fill)"/>

  <!-- Inside-the-lens: graph zoomed 1.6× around the green node at (240,240) -->
  <g clip-path="url(#lens-clip)">
    <!-- subtle green wash inside -->
    <circle cx="240" cy="240" r="135" fill="rgb(43,221,150)" opacity="0.06"/>

    <g transform="translate(-144 -144) scale(1.6)">
      <g stroke="rgb(42,42,42)" stroke-width="2.6" fill="none">
        <line x1="290" y1="110" x2="240" y2="240"/>
        <line x1="240" y1="240" x2="370" y2="220"/>
        <line x1="160" y1="200" x2="240" y2="240"/>
        <line x1="240" y1="240" x2="170" y2="370"/>
        <line x1="80"  y1="90"  x2="160" y2="200"/>
        <line x1="160" y1="200" x2="290" y2="110"/>
      </g>
      <g>
        <circle cx="160" cy="200" r="11" fill="rgb(42,42,42)"/>
        <circle cx="290" cy="110" r="13" fill="rgb(43,221,150)"/>
        <!-- the focus node, with a subtle green halo to mark the magnification target -->
        <circle cx="240" cy="240" r="22" fill="rgb(43,221,150)" opacity="0.25"/>
        <circle cx="240" cy="240" r="14" fill="rgb(43,221,150)"/>
      </g>
    </g>
  </g>

  <!-- Lens rim -->
  <circle cx="240" cy="240" r="135" fill="none" stroke="rgb(42,42,42)" stroke-width="10"/>
  <circle cx="240" cy="240" r="128" fill="none" stroke="rgb(43,221,150)" stroke-width="2.5" opacity="0.7"/>

  <!-- Glass highlights -->
  <path d="M 155 185 Q 125 205 130 260" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  <circle cx="175" cy="170" r="6" fill="#FFFFFF" opacity="0.9"/>

  <!-- Handle (bottom-right of lens) -->
  <line x1="336" y1="336" x2="510" y2="495" stroke="rgb(42,42,42)" stroke-width="26" stroke-linecap="round"/>
  <line x1="341" y1="341" x2="500" y2="485" stroke="#5A5A5A" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
</svg>
