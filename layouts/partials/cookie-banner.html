<div id="cookie-banner" class="cookie-banner" role="dialog" aria-live="polite" aria-label="Cookie consent" hidden>
  <div class="cookie-banner-inner container">
    <p class="cookie-banner-text">We use analytics to understand which pages help. They load only if you accept. See our <a href="{{ "privacy/" | relURL }}">Privacy Policy</a> for details.</p>
    <div class="cookie-banner-actions">
      <button type="button" class="btn btn-secondary cookie-banner-btn" data-cookie-action="reject">Reject</button>
      <button type="button" class="btn btn-primary cookie-banner-btn" data-cookie-action="accept">Accept</button>
    </div>
  </div>
</div>
