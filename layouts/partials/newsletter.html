<div class="newsletter">
  <h3 class="newsletter-title">Be the first to get news from us</h3>

  <div id="sib-form-container" class="sib-form-container newsletter-form-container">
    <div id="error-message" class="sib-form-message-panel newsletter-msg newsletter-msg--error" role="alert">
      <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
        <span class="sib-form-message-panel__inner-text">Your subscription could not be saved. Please try again.</span>
      </div>
    </div>
    <div id="success-message" class="sib-form-message-panel newsletter-msg newsletter-msg--success" role="status">
      <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
        <span class="sib-form-message-panel__inner-text">Thank you — please check your inbox to confirm.</span>
      </div>
    </div>

    <div id="sib-container" class="sib-container--large sib-container--vertical">
      <form id="sib-form" class="newsletter-form" method="POST"
            action="https://f3377fa2.sibforms.com/serve/MUIFAHb9oERwSTX57i4MkrF86RbX1IAC0LzbipD5gU5k1A34SAHzVSAQkgY3HKcu4xReBpLb5DtKq15qaUtPr3qqhat6cvOSDXpTA6ZRNjvO0wnL2J54hPztnXuIgq4_OtvFUs3Dt9p-C3eIEQGirbTld9-iAzSfwHtfqg3Sq_4K41XRVp82z5a0GgjsP7A1VrtuPSMmMVDzppAt"
            data-type="subscription">
        <div class="newsletter-row">
          <div class="sib-input sib-form-block">
            <div class="form__entry entry_block">
              <div class="form__label-row">
                <label class="entry__label sr-only" for="EMAIL">Email address</label>
                <div class="entry__field">
                  <input class="input newsletter-input" type="email" id="EMAIL" name="EMAIL" placeholder="Email address" autocomplete="email" data-required="true" required>
                </div>
              </div>
              <label class="entry__error entry__error--primary"></label>
              <label class="entry__specification">Provide your email address to subscribe.</label>
            </div>
          </div>

          <div class="sib-form-block newsletter-submit-block">
            <button class="newsletter-submit sib-form-block__button sib-form-block__button-with-loader" form="sib-form" type="submit">
              <svg class="icon clickable__icon progress-indicator__icon sib-hide-loader-icon" viewBox="0 0 512 512" aria-hidden="true">
                <path d="M460.116 373.846l-20.823-12.022c-5.541-3.199-7.54-10.159-4.663-15.874 30.137-59.886 28.343-131.652-5.386-189.946-33.641-58.394-94.896-95.833-161.827-99.676C261.028 55.961 256 50.751 256 44.352V20.309c0-6.904 5.808-12.337 12.703-11.982 83.556 4.306 160.163 50.864 202.11 123.677 42.063 72.696 44.079 162.316 6.031 236.832-3.14 6.148-10.75 8.461-16.728 5.01z"/>
              </svg>
              Submit
            </button>
          </div>
        </div>

        <label class="newsletter-consent">
          <input type="checkbox" required>
          <span>I agree to receive emails and understand I can opt-out anytime.</span>
        </label>

        <input type="text" name="email_address_check" value="" class="input--hidden" tabindex="-1" autocomplete="off">
        <input type="hidden" name="locale" value="en">
      </form>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://sibforms.com/forms/end-form/build/sib-styles.css">

  window.REQUIRED_CODE_ERROR_MESSAGE = 'Please choose a country code';
  window.LOCALE = 'en';
  window.EMAIL_INVALID_MESSAGE = window.SMS_INVALID_MESSAGE = "The information provided is invalid. Please review the field format and try again.";
  window.REQUIRED_ERROR_MESSAGE = "This field cannot be left blank. ";
  window.GENERIC_INVALID_MESSAGE = "The information provided is invalid. Please review the field format and try again.";
  window.translation = {
    common: {
      selectedList: '{quantity} list selected',
      selectedLists: '{quantity} lists selected',

  var AUTOHIDE = Boolean(0);
