<td{{ if .highlight }} class="comparison-highlight-col"{{ end }}>
  {{- if eq (printf "%T" .value) "bool" -}}
    {{- if .value -}}
    <svg class="icon-check" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M13.5 4.5l-7 7L3 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    {{- else -}}
    <svg class="icon-x" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    {{- end -}}
  {{- else -}}
  <span class="comparison-text-value">{{ .value }}</span>
  {{- end -}}
</td>
